<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisker Web Design</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>

<!-- ===== HEADER / NAV ===== -->
<header class="banner">
    <img src="whiskerlogo.png" alt="Whisker logo" class="logo">
    <h1>Whisker</h1>
    <h2>⸻ web design ⸻</h2>


    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="portfolio.html">Portfolio</a>
    </nav>

</header>


<!-- ===== HERO =====
     First thing visitors see. Big promise + CTA button. -->
<section class="hero fade-in">
    <h1 class="hero-title">kitty meow meow</h1>
    <p class="hero-sub">by girlfie</p>
</section>


<!-- ===== ABOUT ===== -->
<section class="about fade-in" id="about">
    <h2>About</h2>
    <p>Whisker is a web designing project inspired by my boyfie</p>
</section>

    


<!-- ===== FOOTER ===== -->
<footer class="footer">
    <p>2026 &copy; Whisker Web Design. All rights reserved. Made by 𑄝</p>
</footer>


<!-- ===== SCROLL ANIMATION SCRIPT ===== -->
<script>
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, { threshold: 0.2 });

document.querySelectorAll('.fade-in, .about-points').forEach(el => {
    observer.observe(el);
});
</script>

</body>
